<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador - Beautiful Nails</title>
    <style>
        :root {
            --rosa-suave: #fce4ec;
            --rosa-fuerte: #f06292;
            --dorado: #d4af37;
            --texto: #4a4a4a;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--rosa-suave);
            color: var(--texto);
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        .logo { max-width: 130px; margin-bottom: 15px; border-radius: 50%; border: 2px solid var(--rosa-suave); }
        h2 { color: var(--rosa-fuerte); margin-bottom: 5px; font-size: 1.5rem; }
        
        /* Estilo de los Botones de Selección Inicial (Cards) */
        .radio-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
            margin-top: 10px;
        }
        .radio-card {
            flex: 1;
            cursor: pointer;
        }
        .radio-card input { display: none; }
        .card-content {
            border: 2px solid #eee;
            padding: 15px;
            border-radius: 15px;
            transition: 0.3s;
            font-weight: bold;
            color: #888;
            background: #fafafa;
        }
        .radio-card input:checked + .card-content {
            border-color: var(--rosa-fuerte);
            color: var(--rosa-fuerte);
            background: #fff5f8;
            box-shadow: 0 5px 15px rgba(240, 98, 146, 0.2);
        }

        .service-group { text-align: left; margin-bottom: 20px; }
        label.group-title {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--rosa-fuerte);
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            background-color: #fafafa;
        }

        .checkbox-container {
            background: #fff5f8;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--rosa-suave);
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 10px 5px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .checkbox-item:last-child { border-bottom: none; }
        .checkbox-item input { margin-right: 12px; width: 18px; height: 18px; accent-color: var(--rosa-fuerte); }
        .checkbox-label { flex-grow: 1; font-size: 0.9rem; }
        .checkbox-price { font-weight: bold; color: var(--rosa-fuerte); font-size: 0.9rem; }

        /* Resumen Visual */
        .resumen-box {
            margin-top: 25px;
            text-align: left;
            background: #fdfdfd;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid var(--dorado);
        }
        .resumen-title { font-weight: bold; color: var(--dorado); margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        #lista-resumen { padding-left: 20px; margin: 0; font-size: 0.9rem; line-height: 1.5; }

        .total-box {
            margin-top: 20px;
            padding: 20px;
            background: var(--rosa-suave);
            border-radius: 15px;
            border: 2px dashed var(--rosa-fuerte);
        }
        .total-amount { font-size: 2.2em; font-weight: bold; color: var(--rosa-fuerte); }

        .btn-whatsapp {
            display: block;
            margin-top: 20px;
            background-color: #25d366;
            color: white;
            padding: 15px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
        }
        
        #contenido-calculadora { display: none; }
        .disclaimer { font-size: 0.7rem; color: #999; margin-top: 15px; text-align: justify; line-height: 1.3; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Logo Dulce Nails" class="logo">
    <h2>Cotizador Online</h2>
    <p style="font-size: 0.9em; color: #888;">Paso 1: ¿Qué realizaremos hoy?</p>

    <div class="radio-group">
        <label class="radio-card">
            <input type="radio" name="tipo" value="Aplicación Nueva" onchange="mostrarContenido()">
            <div class="card-content">✨ Aplicación<br>Nueva</div>
        </label>
        <label class="radio-card">
            <input type="radio" name="tipo" value="Retoque" onchange="mostrarContenido()">
            <div class="card-content">💅 Solo<br>Retoque</div>
        </label>
    </div>

    <div id="contenido-calculadora">
        <div class="service-group">
            <label class="group-title">Base y Técnica</label>
            <select id="base" onchange="calcular()">
