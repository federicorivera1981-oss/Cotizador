<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Nails by Dul - Cotizador</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Great+Vibes&family=Lato:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        .font-title { font-family: 'Playfair Display', serif; }
        .font-script { font-family: 'Great Vibes', cursive; }
        .font-body { font-family: 'Lato', sans-serif; }
        .dusty-rose { background-color: #C7747B; }
        .dusty-rose-text { color: #C7747B; }
        .dusty-rose-light { background-color: #FDF5F6; }
        .card-shadow { box-shadow: 0 4px 20px rgba(199, 116, 123, 0.12); }
        .logo-oval { width: 160px; height: 90px; object-fit: cover; border-radius: 100px; border: 1px solid #E5E1D8; display: inline-block; }
        .step-indicator.active { background-color: #C7747B; color: white; transform: scale(1.1); }
        .step-indicator.completed { background-color: #4A443F; color: white; }
        .btn-option { border: 2px solid #F3F4F6; transition: all 0.2s; text-align: left; }
        .btn-option.selected { border-color: #C7747B; background-color: #FDF5F6; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-full font-body bg-[#F9F7F2] text-[#4A443F]">
    <div id="app" class="h-full overflow-auto pb-10">
        <div class="max-w-xl mx-auto px-4 py-8">
            
            <header class="text-center mb-6 fade-in">
                <img src="logo.png" alt="Logo" class="logo-oval mb-2">
                <h1 class="font-title text-3xl dusty-rose-text font-semibold">Beautiful Nails</h1>
                <p class="font-script text-2xl text-gray-500">by Dul</p>
            </header>

            <div class="flex justify-center items-center gap-2 mb-10 fade-in">
                <div id="step-1" class="step-indicator active w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold transition-all">1</div>
                <div class="w-6 h-0.5 bg-gray-200"></div>
                <div id="step-2" class="step-indicator w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold transition-all bg-gray-200">2</div>
                <div class="w-6 h-0.5 bg-gray-200"></div>
                <div id="step-3" class="step-indicator w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold transition-all bg-gray-200">3</div>
                <div class="w-6 h-0.5 bg-gray-200"></div>
                <div id="step-4" class="step-indicator w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold transition-all bg-gray-200">4</div>
            </div>

            <section id="section-1" class="fade-in">
                <h2 class="font-title text-xl text-center mb-8">¿Qué realizaremos hoy?</h2>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="selectType('Nueva Aplicación')" class="bg-white p-6 rounded-3xl card-shadow flex flex-col items-center gap-3">
                        <div class="w-14 h-14 rounded-full dusty-rose-light flex items-center justify-center text-2xl">✨</div>
                        <span class="font-title text-lg">Nueva</span>
                    </button>
                    <button onclick="selectType('Retoque')" class="bg-white p-6 rounded-3xl card-shadow flex flex-col items-center gap-3">
                        <div class="w-14 h-14 rounded-full dusty-rose-light flex items-center justify-center text-2xl">💅</div>
                        <span class="font-title text-lg">Retoque</span>
                    </button>
                </div>
            </section>

            <section id="section-2" class="hidden fade-in">
                <h2 class="font-title text-xl text-center mb-6">Selecciona la Técnica</h2>
                <div class="space-y-6">
                    <div class="bg-white p-5 rounded-3xl card-shadow">
                        <label class="block text-xs uppercase tracking-widest text-gray-400 mb-4 font-bold">Acrílico con Tip</label>
                        <div class="grid grid-cols-1 gap-2">
                            <button onclick="selectTech(this, 200, 'Tip #2')" class="btn-option p-4 rounded-2xl flex justify-between"><span>Hasta número 2</span><b>$200</b></button>
                            <button onclick="selectTech(this, 250, 'Tip #3')" class="btn-option p-4 rounded-2xl flex justify-between"><span>Número 3</span><b>$250</b></button>
                            <button onclick="selectTech(this, 300, 'Tip #4')" class="btn-option p-4 rounded-2xl flex justify-between"><span>Número 4</span><b>$300</b></button>
                            <button onclick="selectTech(this, 350, 'Tip #5')" class="btn-option p-4 rounded-2xl flex justify-between"><span>Número 5</span><b>$350</b></button>
                            <button onclick="selectTech(this, 400, 'Tip #6+')" class="btn-option p-4 rounded-2xl flex justify-between"><span>Número 6 o más</span><b>$400</b></button>
                        </div>
                    </div>
                    <div class="bg-white p-5 rounded-3xl card-shadow">
                        <label class="block text-xs uppercase tracking-widest text-gray-400 mb-4 font-bold">Acrílico Escultural</label>
                        <div class="grid grid-cols-1 gap-2">
                            <button onclick="selectTech(this, 250, 'Escult #2')" class="btn-option p-4 rounded-2xl flex justify-between"><span>Hasta número 2</span><b>$250</b></button>
                            <button onclick="selectTech(this, 300, 'Escult #3')" class="btn-option p-4 rounded-2xl flex justify-between"><span>Número 3</span><b>$300</b></button>
                            <button onclick="selectTech(this, 350, 'Escult #4')" class="btn-option p-4 rounded-2xl flex justify-between"><span>Número 4</span><b>$350</b></button>
                            <button onclick="selectTech(this, 400, 'Escult #5')" class="btn-option p-4 rounded-2xl flex justify-between"><span>Número 5</span><b>$400</b></button>
                            <button onclick="selectTech(this, 450, 'Escult #6+')" class="btn-option p-4 rounded-2xl flex justify-between"><span>Número 6 o más</span><b>$450</b></button>
                        </div>
                    </div>
                    <div class="bg-white p-5 rounded-3xl card-shadow">
                        <label class="block text-xs uppercase tracking-widest text-gray-400 mb-4 font-bold">Otras Técnicas</label>
                        <div class="grid grid-cols-1 gap-2">
                            <button onclick="selectTech(this, 200, 'Rubber')" class="btn-option p-4 rounded-2xl flex justify-between"><span>Rubber</span><b>$200</b></button>
                            <button onclick="selectTech(this, 150, 'Gel Semipermanente')" class="btn-option p-4 rounded-2xl flex justify-between"><span>Gel Semipermanente</span><b>$150</b></button>
                            <button onclick="selectTech(this, 100, 'Retiro')" class="btn-option p-4 rounded-2xl flex justify-between"><span>Retiro de material</span><b>$100</b></button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="section-3" class="hidden fade-in">
                <h2 class="font-title text-xl text-center mb-6">Diseños y Efectos</h2>
                <div class="bg-white p-5 rounded-3xl card-shadow space-y-4">
                    <div class="flex justify-between items-center py-2 border-b">
                        <span class="text-sm">Espejo / Aurora / Sticker ($5)</span>
                        <select class="dec-qty p-2 bg-gray-50 rounded-lg text-xs" data-price="5" onchange="updateCalculo()"><option value="0">0</option><option value="2">2</option><option value="4">4</option><option value="10">Set</option></select>
                    </div>
                    <div class="flex justify-between items-center py-2 border-b">
                        <span class="text-sm">French / Cat Eye / Art Simple ($10)</span>
                        <select class="dec-qty p-2 bg-gray-50 rounded-lg text-xs" data-price="10" onchange="updateCalculo()"><option value="0">0</option><option value="2">2</option><option value="4">4</option><option value="10">Set</option></select>
                    </div>
                    <div class="flex justify-between items-center py-2 border-b">
                        <span class="text-sm">French Doble / Cristales M ($15)</span>
                        <select class="dec-qty p-2 bg-gray-50 rounded-lg text-xs" data-price="15" onchange="updateCalculo()"><option value="0">0</option><option value="2">2</option><option value="4">4</option><option value="10">Set</option></select>
                    </div>
                    <div class="flex justify-between items-center py-2">
                        <span class="text-sm">Uña completa Cristales ($30-$50)</span>
                        <select class="dec-qty p-2 bg-gray-50 rounded-lg text-xs" data-price="40" onchange="updateCalculo()"><option value="0">0</option><option value="1">1</option><option value="2">2</option></select>
                    </div>
                </div>
                <button onclick="goTo(4)" class="w-full mt-6 py-4 dusty-rose text-white rounded-2xl font-bold">Continuar →</button>
            </section>

            <section id="section-4" class="hidden fade-in">
                <h2 class="font-title text-xl text-center mb-6">Servicios SPA</h2>
                <div class="bg-white p-5 rounded-3xl card-shadow mb-6 space-y-3">
                    <label class="flex justify-between items-center p-3 border rounded-2xl cursor-pointer">
                        <div class="flex items-center"><input type="checkbox" class="spa-check" value="100" data-name="Mani Rusa" onchange="updateCalculo()"><span class="ml-3 text-sm">Manicura Rusa</span></div><b>$100</b>
                    </label>
                    <label class="flex justify-between items-center p-3 border rounded-2xl cursor-pointer">
                        <div class="flex items-center"><input type="checkbox" class="spa-check" value="250" data-name="Pedicure" onchange="updateCalculo()"><span class="ml-3 text-sm">Pedicure</span></div><b>$250</b>
                    </label>
                </div>
                <div class="bg-[#4A443F] text-white p-6 rounded-3xl shadow-xl">
                    <div id="resumen-lista" class="space-y-1 mb-4 text-xs opacity-80"></div>
                    <div class="flex justify-between items-center border-t border-white/10 pt-4">
                        <span class="text-xs uppercase opacity-60">Inversión Total</span>
                        <span id="precio-final" class="text-3xl font-title font-bold text-[#E8C4C7]">$0</span>
                    </div>
                </div>
                <button onclick="enviar()" class="w-full mt-6 py-5 bg-[#25D366] text-white font-bold rounded-2xl">Confirmar por WhatsApp</button>
            </section>
        </div>
    </div>

    <script>
        let cot = { tipo: '', total: 0, items: [] };
        let selectedTechs = [];

        function selectType(v) { cot.tipo = v; goTo(2); }
        
        function selectTech(btn, price, name) {
            btn.classList.toggle('selected');
            const idx = selectedTechs.findIndex(s => s.name === name);
            if(idx > -1) selectedTechs.splice(idx, 1);
            else selectedTechs.push({price, name});
            updateCalculo();
            setTimeout(() => goTo(3), 400); // Transición automática al seleccionar técnica
        }

        function goTo(s) {
            document.querySelectorAll('section').forEach(sec => sec.classList.add('hidden'));
            document.getElementById(`section-${s}`).classList.remove('hidden');
            document.querySelectorAll('.step-indicator').forEach((si, i) => {
                si.classList.toggle('active', i+1 === s);
                si.classList.toggle('completed', i+1 < s);
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateCalculo() {
            let total = 0; let items = [cot.tipo];
            selectedTechs.forEach(s => { total += s.price; items.push(s.name); });
            document.querySelectorAll('.dec-qty').forEach(s => {
                let q = parseInt(s.value); if(q > 0) { total += (q * s.dataset.price); items.push(q + " diseño(s)"); }
            });
            document.querySelectorAll('.spa-check:checked').forEach(c => {
                total += parseInt(c.value); items.push(c.dataset.name);
            });
            cot.total = total; cot.items = items;
            document.getElementById('precio-final').innerText = `$${total}`;
            document.getElementById('resumen-lista').innerHTML = items.map(i => `<div>${i}</div>`).join('');
        }

        function enviar() {
            const t = encodeURIComponent("¡Hola Dulce! Mi cotización: " + cot.items.join(", ") + ". Total: $" + cot.total);
            window.open(`https://wa.me/5215521969219?text=${t}`, "_blank");
        }
    </script>
</body>
</html>
