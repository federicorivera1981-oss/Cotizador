<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador - Dulce Nails</title>
    <style>
        :root {
            --rosa-suave: #fce4ec;
            --rosa-fuerte: #f06292;
            --dorado: #d4af37;
            --texto: #4a4a4a;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--rosa-suave);
            color: var(--texto);
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        .logo {
            max-width: 150px;
            margin-bottom: 20px;
            border-radius: 50%;
        }
        h2 { color: var(--rosa-fuerte); margin-bottom: 5px; }
        p.subtitle { font-size: 0.9em; margin-bottom: 25px; color: #888; }
        
        .service-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label.group-title {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--rosa-fuerte);
            font-size: 0.9rem;
        }
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background-color: #fafafa;
        }

        /* Estilos específicos para los Checkboxes de Complementos */
        .checkbox-container {
            background: #fff5f8;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--rosa-suave);
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 8px 5px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .checkbox-item:last-child { border-bottom: none; }
        .checkbox-item input {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            accent-color: var(--rosa-fuerte);
        }
        .checkbox-label { flex-grow: 1; font-size: 0.9rem; }
        .checkbox-price { font-weight: bold; color: var(--rosa-fuerte); font-size: 0.9rem; }

        .total-box {
            margin-top: 25px;
            padding: 20px;
            background: var(--rosa-suave);
            border-radius: 15px;
            border: 2px dashed var(--rosa-fuerte);
        }
        .total-amount {
            font-size: 2.2em;
            font-weight: bold;
            color: var(--rosa-fuerte);
        }
        .btn-whatsapp {
            display: block;
            margin-top: 20px;
            background-color: #25d366;
            color: white;
            padding: 15px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }
        .disclaimer { font-size: 0.7rem; color: #999; margin-top: 15px; text-align: justify; line-height: 1.2; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Logo Dulce Nails" class="logo">
    <h2>Cotizador Dulce Nails</h2>
    <p class="subtitle">Selecciona tus servicios</p>

    <div class="service-group">
        <label class="group-title">Base y Esmaltado (Manos)</label>
        <select id="base" onchange="calcular()">
            <option value="0" data-desc="">Selecciona una opción...</option>
            <option value="200" data-desc="Aplicación Rubber">Aplicación Rubber - $200</option>
            <option value="200" data-desc="Calcio Cristal">Calcio Cristal - $200</option>
            <option value="150" data-desc="Gel Semipermanente">Gel Semipermanente - $150</option>
        </select>
    </div>

    <div class="service-group">
        <label class="group-title">Extensiones / Largo</label>
        <select id="acrilico" onchange="calcular()">
            <option value="0" data-desc="">Sin extensiones</option>
            <option value="200" data-desc="Acrílico Tip #2">Acrílico con Tip (Hasta #2) - $200</option>
            <option value="250" data-desc="Escultural #2">Escultural (Hasta #2) - $250</option>
            <option value="250" data-desc="Acrílico Tip #3">Acrílico con Tip (#3) - $250</option>
            <option value="300" data-desc="Escultural #3">Escultural (#3) - $300</option>
            <option value="300" data-desc="Acrílico Tip #4">Acrílico con Tip (#4) - $300</option>
            <option value="350" data-desc="Escultural #4">Escultural (#4) - $350</option>
            <option value="350" data-desc="Acrílico Tip #5">Acrílico con Tip (#5) - $350</option>
            <option value="400" data-desc="Escultural #5">Escultural (#5) - $400</option>
        </select>
    </div>

    <div class="service-group">
        <label class="group-title">Complementos y Spa</label>
        <div class="checkbox-container">
            <label class="checkbox-item">
                <input type="checkbox" class="comp" value="100" data-desc="Manicura Rusa" onchange="calcular()">
                <span class="checkbox-label">Manicura Rusa</span>
                <span class="checkbox-price">$100</span>
            </label>
            <label class="checkbox-item">
                <input type="checkbox" class="comp" value="250" data-desc="Spa Manicure" onchange="calcular()">
                <span class="checkbox-label">Spa Manicure</span>
                <span class="checkbox-price">$250</span>
            </label>
            <label class="checkbox-item">
                <input type="checkbox" class="comp" value="100" data-desc="Diseño Sencillo" onchange="calcular()">
                <span class="checkbox-label">Diseño Sencillo</span>
                <span class="checkbox-price">$100</span>
            </label>
            <label class="checkbox-item">
                <input type="checkbox" class="comp" value="100" data-desc="Retiro" onchange="calcular()">
                <span class="checkbox-label">Retiro de material</span>
                <span class="checkbox-price">$100</span>
            </label>
            <label class="checkbox-item">
                <input type="checkbox" class="comp" value="150" data-desc="Retoque Acrílico" onchange="calcular()">
                <span class="checkbox-label">Retoque Acrílico</span>
                <span class="checkbox-price">$150</span>
            </label>
            <label class="checkbox-item">
                <input type="checkbox" class="comp" value="100" data-desc="Retoque Gel" onchange="calcular()">
                <span class="checkbox-label">Retoque Gel (Mismo color)</span>
                <span class="checkbox-price">$100</span>
            </label>
        </div>
    </div>

    <div class="service-group">
        <label class="group-title">Servicio de Pies</label>
        <select id="pies" onchange="calcular()">
            <option value="0" data-desc="">Sin servicio de pies</option>
            <option value="150" data-desc="Gel en pies">Gel en pies - $150</option>
            <option value="250" data-desc="Pedicure">Pedicure - $250</option>
            <option value="400" data-desc="Spa Pedicure">Spa Pedicure - $400</option>
        </select>
    </div>

    <div class="total-box">
        <div>Total Estimado:</div>
        <div class="total-amount" id="total">$0.00</div>
    </div>

    <div class="disclaimer">
        * No se sacan uñas enterradas. Por higiene, no se atienden uñas con hongos o pie diabético.
    </div>

    <a href="#" id="btnWsp" class="btn-whatsapp" target="_blank">Agendar por WhatsApp</a>
</div>

<script>
    function calcular() {
        let total = 0;
        let seleccion = [];

        // Sumar listas desplegables
        ['base', 'acrilico', 'pies'].forEach(id => {
            const el = document.getElementById(id);
            const val = parseInt(el.value);
            if (val > 0) {
                total += val;
                seleccion.push(el.options[el.selectedIndex].getAttribute('data-desc'));
            }
        });

        // Sumar checkboxes de complementos
        document.querySelectorAll('.comp:checked').forEach(cb => {
            total += parseInt(cb.value);
            seleccion.push(cb.getAttribute('data-desc'));
        });

        document.getElementById('total').innerText = "$" + total + ".00";
        
        // Número de Dulce (521 + 10 dígitos)
        const msj = encodeURIComponent("¡Hola Dulce! 💅 Me coticé: " + seleccion.join(", ") + ". Total estimado: $" + total);
        document.getElementById('btnWsp').href = "https://wa.me/5215521969219?text=" + msj;
    }
</script>

</body>
</html>
