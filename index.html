<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador - Nails by Dul</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --beige-fondo: #F9F7F2;
            --crema-card: #FFFFFF;
            --cafe-texto: #4A443F;
            --dorado-acento: #D4A373;
            --borde: #E5E1D8;
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--beige-fondo); color: var(--cafe-texto); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: var(--crema-card); padding: 40px 25px; border-radius: 2px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); max-width: 480px; width: 100%; text-align: center; border: 1px solid var(--borde); }
        .logo { width: 180px; height: 100px; object-fit: cover; border-radius: 100px; margin-bottom: 20px; border: 1px solid var(--borde); display: inline-block; }
        
        h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 400; margin-bottom: 5px; letter-spacing: 1px; }
        .step-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--dorado-acento); margin-bottom: 25px; display: block; }
        
        /* Paso 1: Botones */
        .radio-group { display: flex; gap: 12px; justify-content: center; margin-bottom: 35px; }
        .radio-card { flex: 1; cursor: pointer; }
        .radio-card input { display: none; }
        .card-content { border: 1px solid var(--borde); padding: 20px 5px; transition: 0.3s; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; line-height: 1.5; }
        .emoji-icon { display: block; font-size: 1.5rem; margin-bottom: 8px; }
        .radio-card input:checked + .card-content { background: var(--cafe-texto); color: white; border-color: var(--cafe-texto); }

        #contenido-calculadora { display: none; }

        .service-group { text-align: left; margin-bottom: 25px; }
        label.group-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; margin-bottom: 8px; display: flex; align-items: center; }
        
        /* Tooltip minimalista para condiciones */
        .info-icon { font-size: 0.7rem; color: var(--dorado-acento); border: 1px solid var(--dorado-acento); border-radius: 50%; width: 14px; height: 14px; display: inline-flex; align-items: center; justify-content: center; margin-left: 8px; cursor: help; font-style: normal; }
        .info-icon:hover::after { content: attr(data-info); position: absolute; background: var(--cafe-texto); color: white; padding: 10px; border-radius: 4px; font-size: 0.7rem; width: 200px; font-family: 'Montserrat'; font-style: normal; z-index: 10; margin-top: -60px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        select, .qty-select { width: 100%; padding: 12px; border: 1px solid var(--borde); background-color: var(--beige-fondo); font-family: 'Montserrat', sans-serif; font-size: 0.85rem; color: var(--cafe-texto); appearance: none; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%3E%3Cpath%20fill%3D%22%234A443F%22%20d%3D%22M7%2010l5%205%205-5z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 10px center; }

        /* Decorado por uña */
        .decorado-item { display: grid; grid-template-columns: 1fr 80px; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--borde); }
        .decorado-label { font-size: 0.8rem; }
        .qty-select { padding: 5px; font-size: 0.75rem; width: 70px; background-position: right 5px center; }

        .checkbox-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--borde); cursor: pointer; }
        .checkbox-item input { margin-right: 15px; accent-color: var(--cafe-texto); }

        .results-box { margin-top: 25px; padding: 25px 0; border-top: 1px solid var(--cafe-texto); }
        .total-amount { font-family: 'Playfair Display', serif; font-size: 2.8rem; }
        .time-estimate { font-size: 0.8rem; color: var(--dorado-acento); font-style: italic; margin-top: 5px; }

        .btn-whatsapp { display: block; margin-top: 25px; background-color: var(--cafe-texto); color: white; padding: 20px; text-decoration: none; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }
        .footer-note { font-size: 0.6rem; color: #aaa; margin-top: 20px; line-height: 1.4; text-align: justify; }
    </style>
</head>
