<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Nails by Dul - Cotizador</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Great+Vibes&family=Lato:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        .font-title { font-family: 'Playfair Display', serif; }
        .font-script { font-family: 'Great Vibes', cursive; }
        .font-body { font-family: 'Lato', sans-serif; }
        
        .dusty-rose { background-color: #C7747B; }
        .dusty-rose-text { color: #C7747B; }
        .dusty-rose-light { background-color: #FDF5F6; }
        
        .card-shadow { box-shadow: 0 4px 20px rgba(199, 116, 123, 0.12); }
        
        .logo-oval {
            width: 160px; height: 90px; object-fit: cover; border-radius: 100px;
            border: 1px solid #E5E1D8; display: inline-block;
        }

        .step-indicator.active { background-color: #C7747B; color: white; transform: scale(1.1); }
        .step-indicator.completed { background-color: #4A443F; color: white; }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Estilo para los botones de técnica tipo el video */
        .tech-card {
            border: 2px solid #F3F4F6;
            transition: all 0.2s;
        }
        .tech-card.selected {
            border-color: #C7747B;
            background-color: #FDF5F6;
        }
    </style>
</head>
<body class="h-full font-body bg-[#F9F7F2] text-[#4A443F]">
    <div id="app" class="h-full overflow-auto">
        <div class="max-w-xl mx-auto px-4 py-8">
            
            <header class="text-center mb-6 fade-in">
                <img src="logo.png" alt="Logo" class="logo-oval mb-2">
                <h1 class="font-title text-3xl dusty-rose-text font-semibold">Beautiful Nails</h1>
                <p class="font-script text-2xl text-gray-500">by Dul</p>
            </header>

            <div class="flex justify-center items-center gap-2 mb-10 fade-in">
                <div id="step-1" class="step-indicator active w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all">1</div>
                <div class="w-10 h-0.5 bg-gray-200"></div>
                <div id="step-2" class="step-indicator w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all bg-gray-200">2</div>
                <div class="w-10 h-0.5 bg-gray-200"></div>
                <div id="step-3" class="step-indicator w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all bg-gray-200">3</div>
            </div>

            <section id="section-1" class="fade-in">
                <h2 class="font-title text-xl text-center mb-8">¿Qué realizaremos hoy?</h2>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="selectType('Nueva Aplicación')" class="bg-white p-6 rounded-3xl card-shadow flex flex-col items-center gap-3 border-2 border-transparent hover:border-pink-200 transition-all">
                        <div class="w-14 h-14 rounded-full dusty-rose-light flex items-center justify-center text-2xl">✨</div>
                        <span class="font-title text-lg">Nueva</span>
                    </button>
                    <button onclick="selectType('Retoque')" class="bg-white p-6 rounded-3xl card-shadow flex flex-col items-center gap-3 border-2 border-transparent hover:border-pink-200 transition-all">
                        <div class="w-14 h-14 rounded-full dusty-rose-light flex items-center justify-center text-2xl">💅</div>
                        <span class="font-title text-lg">Retoque</span>
                    </button>
                </div>
            </section>

            <section id="section-2" class="hidden fade-in">
                <h2 class="font-title text-xl text-center mb-6">Selecciona la base</h2>
                <div class="space-y-3">
                    <div class="bg-white p-5 rounded-3xl card-shadow">
                        <label class="block text-xs uppercase tracking-widest text-gray-400 mb-3 font-bold">Geles y Acrílicos</label>
                        <select id="main-tech" onchange="updateCalculo()" class="w-full p-4 bg-gray-50 border-none rounded-2xl text-sm focus:ring-2 focus:ring-pink-200">
                            <option value="0" data-time="0">Seleccionar servicio...</option>
                            <optgroup label="Geles">
                                <option value="200" data-time="60">Rubber - $200</option>
                                <option value="150" data-time="60">Gel Semipermanente - $150</option>
                            </optgroup>
                            <optgroup label="Acrílicos (Largo base #2)">
                                <option value="200" data-time="90">Acrílico con Tip - $200</option>
                                <option value="250" data-time="100">Escultural - $250</option>
                            </optgroup>
                            <optgroup label="Mantenimiento">
                                <option value="150" data-time="80">Retoque Acrílico - $150</option>
                                <option value="100" data-time="80">Retoque Gel - $100</option>
                            </optgroup>
                        </select>
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button onclick="goTo(1)" class="flex-1 py-4 text-gray-400 font-medium text-sm">← Volver</button>
                    <button onclick="goTo(3)" class="flex-[2] py-4 dusty-rose text-white rounded-2xl font-bold shadow-lg shadow-pink-200">Siguiente paso</button>
                </div>
            </section>

            <section id="section-3" class="hidden fade-in text-left">
                <div class="bg-white p-6 rounded-3xl card-shadow mb-6">
                    <h3 class="font-title text-lg dusty-rose-text mb-4">Diseños y SPA</h3>
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-sm font-medium">Efectos ($5 uña)</p>
                                <p class="text-[10px] text-gray-400">+5 min por uña</p>
                            </div>
                            <select class="dec-qty p-2 bg-gray-50 rounded-lg text-sm" data-price="5" data-time="5" onchange="updateCalculo()">
                                <option value="0">0</option><option value="2">2</option><option value="4">4</option><option value="10">Set (10)</option>
                            </select>
                        </div>
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-sm font-medium">Art / French ($10 uña)</p>
                                <p class="text-[10px] text-gray-400">+10 min por uña</p>
                            </div>
                            <select class="dec-qty p-2 bg-gray-50 rounded-lg text-sm" data-price="10" data-time="10" onchange="updateCalculo()">
                                <option value="0">0</option><option value="2">2</option><option value="4">4</option><option value="10">Set (10)</option>
                            </select>
                        </div>
                        <hr class="border-gray-50">
                        <label class="flex justify-between items-center cursor-pointer">
                            <span class="text-sm font-medium">Manicura Rusa ($100)</span>
                            <input type="checkbox" class="spa-check" value="100" data-time="20" data-name="Mani Rusa" onchange="updateCalculo()" class="accent-pink-500">
                        </label>
                        <label class="flex justify-between items-center cursor-pointer">
                            <span class="text-sm font-medium">Pedicure ($250)</span>
                            <input type="checkbox" class="spa-check" value="250" data-time="45" data-name="Pedicure" onchange="updateCalculo()" class="accent-pink-500">
                        </label>
                    </div>
                </div>

                <div class="bg-[#4A443F] text-white p-6 rounded-3xl card-shadow relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-20 h-20 bg-white/5 rounded-full -mr-10 -mt-10"></div>
                    <p class="text-[10px] uppercase tracking-widest opacity-60 mb-4 text-center">Resumen de Inversión</p>
                    <div id="resumen-lista" class="space-y-2 mb-6 text-sm">
                        </div>
                    <div class="border-t border-white/10 pt-4 flex justify-between items-end">
                        <div>
                            <p class="text-[10px] opacity-60 uppercase">Total Estimado</p>
                            <p id="precio-final" class="text-3xl font-title font-bold">$0</p>
                        </div>
                        <p id="tiempo-final" class="text-xs italic opacity-60">~0 min</p>
                    </div>
                </div>

                <button onclick="enviar()" class="w-full mt-6 py-5 bg-[#25D366] text-white font-bold rounded-2xl shadow-xl flex items-center justify-center gap-3 hover:scale-[1.02] transition-transform">
                    Confirmar por WhatsApp
                </button>
                <button onclick="goTo(2)" class="w-full mt-4 text-gray-400 text-xs">← Modificar selección</button>
            </section>
        </div>
    </div>

    <script>
        let cotizacion = { tipo: '', total: 0, tiempo: 0, items: [] };

        function selectType(val) {
            cotizacion.tipo = val;
            goTo(2);
        }

        function goTo(step) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`section-${step}`).classList.remove('hidden');
            
            document.querySelectorAll('.step-indicator').forEach((si, i) => {
                si.classList.toggle('active', i+1 === step);
                si.classList.toggle('completed', i+1 < step);
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateCalculo() {
            let total = 0; let tiempo = 0; let items = [cotizacion.tipo];
            
            const tech = document.getElementById('main-tech');
            const opt = tech.options[tech.selectedIndex];
            if(parseInt(tech.value) > 0) {
                total += parseInt(tech.value);
                tiempo += parseInt(opt.dataset.time);
                items.push(opt.text.split('-')[0].trim());
            }

            document.querySelectorAll('.dec-qty').forEach(s => {
                let q = parseInt(s.value);
                if(q > 0) {
                    total += (q * s.dataset.price);
                    tiempo += (q * s.dataset.time);
                    items.push(q + " diseño(s)");
                }
            });

            document.querySelectorAll('.spa-check:checked').forEach(c => {
                total += parseInt(c.value);
                tiempo += parseInt(c.dataset.time);
                items.push(c.dataset.name);
            });

            cotizacion.total = total; cotizacion.tiempo = tiempo; cotizacion.items = items;
            
            document.getElementById('precio-final').innerText = `$${total}`;
            document.getElementById('tiempo-final').innerText = `~${tiempo} min`;
            
            const resumenDiv = document.getElementById('resumen-lista');
            resumenDiv.innerHTML = items.map(i => `<div class="flex justify-between opacity-90"><span>${i}</span></div>`).join('');
        }

        function enviar() {
            const text = encodeURIComponent("¡Hola Dulce! Mi cotización: " + cotizacion.items.join(", ") + ". Total: $" + cotizacion.total + " (~" + cotizacion.tiempo + " min)");
            window.open(`https://wa.me/5215521969219?text=${text}`, "_blank");
        }
    </script>
</body>
</html>
