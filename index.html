<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador - Nails by Dul</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --beige-fondo: #F9F7F2;
            --crema-card: #FFFFFF;
            --cafe-texto: #4A443F;
            --dorado-acento: #D4A373;
            --borde: #E5E1D8;
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--beige-fondo); color: var(--cafe-texto); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: var(--crema-card); padding: 40px 25px; border-radius: 2px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); max-width: 480px; width: 100%; text-align: center; border: 1px solid var(--borde); }
        .logo { width: 180px; height: 100px; object-fit: cover; border-radius: 100px; margin-bottom: 20px; border: 1px solid var(--borde); display: inline-block; }
        
        h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 400; margin-bottom: 5px; letter-spacing: 1px; }
        .step-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--dorado-acento); margin-bottom: 25px; display: block; }
        
        /* Botones Ovalados Estilo Canva */
        .radio-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
        .radio-card { flex: 1; min-width: 130px; cursor: pointer; }
        .radio-card input { display: none; }
        .card-content { border: 1px solid var(--borde); padding: 15px 5px; transition: 0.3s; font-size: 0.65rem; letter-spacing: 1px; text-transform: uppercase; line-height: 1.2; border-radius: 50px; }
        .radio-card input:checked + .card-content { background: var(--cafe-texto); color: white; border-color: var(--cafe-texto); }

        #seccion-tecnicas, #contenido-final { display: none; }

        /* Contenedores Dinámicos con Efecto Flotante */
        .subcat-content { display: none; text-align: left; margin-top: 15px; border-top: 1px solid var(--borde); padding-top: 15px; }
        
        .service-group { text-align: left; margin-bottom: 25px; }
        label.group-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; margin-bottom: 12px; display: block; }

        select, .qty-select { width: 100%; padding: 12px; border: 1px solid var(--borde); background-color: var(--beige-fondo); font-family: 'Montserrat', sans-serif; font-size: 0.85rem; color: var(--cafe-texto); appearance: none; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%3E%3Cpath%20fill%3D%22%234A443F%22%20d%3D%22M7%2010l5%205%205-5z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 10px center; }

        .checkbox-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--borde); cursor: pointer; }
        .checkbox-item input { margin-right: 15px; accent-color: var(--cafe-texto); }
        .checkbox-label { flex-grow: 1; font-size: 0.85rem; font-weight: 300; }
        
        .decorado-item { display: grid; grid-template-columns: 1fr 85px; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--borde); }
        .decorado-label { font-size: 0.8rem; line-height: 1.3; }
        .qty-select { padding: 5px; font-size: 0.75rem; width: 75px; background-position: right 5px center; }

        .results-box { margin-top: 30px; padding: 25px 0; border-top: 2px solid var(--cafe-texto); }
        .total-amount { font-family: 'Playfair Display', serif; font-size: 2.8rem; }
        .time-estimate { font-size: 0.85rem; color: var(--dorado-acento); font-style: italic; margin-top: 5px; }

        .btn-whatsapp { display: block; margin-top: 25px; background-color: var(--cafe-texto); color: white; padding: 20px; text-decoration: none; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; text-align: center; }
        .footer-note { font-size: 0.6rem; color: #aaa; margin-top: 20px; line-height: 1.4; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Logo" class="logo">
    <h2>Beautiful Nails</h2>
    <span class="step-label">¿Qué realizaremos hoy?</span>

    <div class="radio-group">
        <label class="radio-card">
            <input type="radio" name="tipo_servicio" value="Aplicación Nueva" onclick="mostrarTecnicas()">
            <div class="card-content">✨ Nueva Aplicación</div>
        </label>
        <label class="radio-card">
            <input type="radio" name="tipo_servicio" value="Retoque" onclick="mostrarTecnicas()">
            <div class="card-content">💅 Solo Retoque</div>
        </label>
    </div>

    <div id="seccion-tecnicas">
        <span class="step-label">Selecciona la Técnica</span>
        <div class="radio-group">
            <label class="radio-card"><input type="radio" name="subcat" value="geles" onclick="mostrarOpcionesSubcat('geles')"><div class="card-content">Geles</div></label>
            <label class="radio-card"><input type="radio" name="subcat" value="acrilicos" onclick="mostrarOpcionesSubcat('acrilicos')"><div class="card-content">Uñas Acrílicas</div></label>
            <label class="radio-card"><input type="radio" name="subcat" value="mantenimiento" onclick="mostrarOpcionesSubcat('mantenimiento')"><div class="card-content">Mantenimiento</div></label>
            <label class="radio-card"><input type="radio" name="subcat" value="otros" onclick="mostrarOpcionesSubcat('otros')"><div class="card-content">Otros</div></label>
        </div>

        <div id="opciones-geles" class="subcat-content">
            <label class="group-title">Opciones de Geles</label>
            <select id="select-geles" onchange="calcular()">
                <option value="0" data-time="0">Seleccionar...</option>
                <option value="200" data-time="60">Rubber - $200</option>
                <option value="100" data-time="40">Calcio Cristal - $100</option>
                <option value="150" data-time="60">Gel Semipermanente Manos - $150</option>
            </select>
        </div>

        <div id="opciones-acrilicos" class="subcat-content">
            <label class="group-title">Acrílico con TIP / Escultural</label>
            <select id="select-acrilicos" onchange="calcular()">
                <option value="0" data-time="0">Seleccionar Largo...</option>
                <optgroup label="Acrílico con TIP">
                    <option value="200" data-time="90">Hasta #2 - $200</option>
                    <option value="250" data-time="100">Número #3 - $250</option>
                    <option value="300" data-time="110">Número #4 - $300</option>
                </optgroup>
                <optgroup label="Acrílico Escultural">
                    <option value="250" data-time="100">Hasta #2 - $250</option>
                    <option value="300" data-time="110">Número #3 - $300</option>
                    <option value="350" data-time="120">Número #4 - $350</option>
                </optgroup>
            </select>
        </div>

        <div id="opciones-mantenimiento" class="subcat-content">
            <label class="group-title">Mantenimiento</label>
            <select id="select-mantenimiento" onchange="calcular()">
                <option value="0" data-time="0">Seleccionar...</option>
                <option value="150" data-time="80">Retoque Acrílico - $150</option>
                <option value="100" data-time="80">Retoque Gel - $100</option>
                <option value="50" data-time="40">Cambio de forma - $50</option>
            </select>
        </div>

        <div id="opciones-otros" class="subcat-content">
            <label class="group-title">Otras Técnicas</label>
            <select id="select-otros" onchange="calcular()">
                <option value="0" data-time="0">Seleccionar...</option>
                <option value="200" data-time="90">Polygel (Acrígel) - $200</option>
                <option value="100" data-time="80">Retiro de material - $100</option>
            </select>
        </div>
    </div>

    <div id="contenido-final">
        <div class="service-group" style="margin-top: 35px; border-top: 1px solid var(--borde); padding-top: 25px;">
            <label class="group-title">Efectos y Decorado (Por uña)</label>
            <div class="decorado-item">
                <span class="decorado-label">Espejo / Aurora / Sticker ($5)</span>
                <select class="qty-select decorado-qty" data-price="5" data-time="5" onchange="calcular()">
                    <option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="4">4</option><option value="10">Set (10)</option>
                </select>
            </div>
            <div class="decorado-item">
                <span class="decorado-label">French / Mano Alzada / Cristales ($10)</span>
                <select class="qty-select decorado-qty" data-price="10" data-time="10" onchange="calcular()">
                    <option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="4">4</option><option value="10">Set (10)</option>
                </select>
            </div>
        </div>

        <div class="service-group">
            <label class="group-title">Servicios SPA</label>
            <div class="checkbox-container">
                <label class="checkbox-item"><input type="checkbox" class="extra-check" value="100" data-time="20" data-desc="Mani Rusa" onchange="calcular()"><span class="checkbox-label">Manicura Rusa ($100)</span></label>
                <label class="checkbox-item"><input type="checkbox" class="extra-check" value="250" data-time="45" data-desc="Pedicure" onchange="calcular()"><span class="checkbox-label">Pedicure ($250)</span></label>
                <label class="checkbox-item"><input type="checkbox" class="extra-check" value="400" data-time="60" data-desc="Spa Pedi" onchange="calcular()"><span class="checkbox-label">Spa Pedicure ($400)</span></label>
            </div>
        </div>

        <div class="results-box">
            <span style="font-size:0.65rem; text-transform:uppercase; letter-spacing:2px;">Inversión Estimada</span>
            <div class="total-amount" id="total">$0.00</div>
            <div class="time-estimate" id="tiempo">Tiempo estimado: ~0 min</div>
        </div>

        <a href="#" id="btnWsp" class="btn-whatsapp" target="_blank">Agendar por WhatsApp</a>
        <p class="footer-note">* Los tiempos son aproximados. No se atienden uñas con hongos, enterradas o pie diabético.</p>
    </div>
</div>

<script>
    function mostrarTecnicas() {
        document.getElementById('seccion-tecnicas').style.display = 'block';
        calcular();
    }

    function mostrarOpcionesSubcat(subcat) {
        document.querySelectorAll('.subcat-content').forEach(div => div.style.display = 'none');
        document.getElementById('opciones-' + subcat).style.display = 'block';
        document.getElementById('contenido-final').style.display = 'block';
        
        // Evitar sumar doble técnica al cambiar de botón
        ['select-geles', 'select-acrilicos', 'select-mantenimiento', 'select-otros'].forEach(id => {
            if(id !== 'select-' + subcat) document.getElementById(id).value = "0";
        });
        calcular();
    }

    function calcular() {
        let t = 0; let m = 0; let d = [];
        
        const r = document.querySelector('input[name="tipo_servicio"]:checked');
        if(r) d.push(r.value);

        // Sumar técnica
        ['select-geles', 'select-acrilicos', 'select-mantenimiento', 'select-otros'].forEach(id => {
            const s = document.getElementById(id);
            const opt = s.options[s.selectedIndex];
            if(parseInt(s.value) > 0) {
                t += parseInt(s.value); m += parseInt(opt.getAttribute('data-time'));
                d.push(opt.text.split('-')[0].trim());
            }
        });

        // Sumar diseños
        document.querySelectorAll('.decorado-qty').forEach(s => {
            let cant = parseInt(s.value);
            if(cant > 0) {
                t += (cant * parseInt(s.getAttribute('data-price')));
                m += (cant * parseInt(s.getAttribute('data-time')));
                d.push(cant + " diseño(s)");
            }
        });

        // Sumar Extras
        document.querySelectorAll('.extra-check:checked').forEach(c => {
            t += parseInt(c.value); m += parseInt(c.getAttribute('data-time'));
            d.push(c.getAttribute('data-desc'));
        });

        document.getElementById('total').innerText = "$" + t + ".00";
        document.getElementById('tiempo').innerText = "Tiempo estimado: ~" + m + " min";
        
        const msg = encodeURIComponent("¡Hola Dulce! 💅 Mi cotización: " + d.join(", ") + ". Total: $" + t + " (~" + m + " min)");
        document.getElementById('btnWsp').href = "https://wa.me/5215521969219?text=" + msg;
    }
</script>
</body>
</html>
