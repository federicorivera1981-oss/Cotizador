<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador - Beautiful Nails</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --beige-fondo: #F9F7F2;
            --crema-card: #FFFFFF;
            --cafe-texto: #4A443F;
            --dorado-acento: #D4A373;
            --borde: #E5E1D8;
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--beige-fondo); color: var(--cafe-texto); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: var(--crema-card); padding: 40px 25px; border-radius: 2px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); max-width: 450px; width: 100%; text-align: center; border: 1px solid var(--borde); }
        .logo { width: 180px; height: 100px; object-fit: cover; border-radius: 100px; margin-bottom: 20px; border: 1px solid var(--borde); display: inline-block; }
        
        h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 400; margin-bottom: 5px; }
        .step-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--dorado-acento); margin-bottom: 25px; display: block; }
        
        /* Botones Iniciales */
        .radio-group { display: flex; gap: 12px; justify-content: center; margin-bottom: 35px; }
        .radio-card { flex: 1; cursor: pointer; }
        .radio-card input { display: none; }
        .card-content { border: 1px solid var(--borde); padding: 20px 5px; transition: 0.3s; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; }
        .radio-card input:checked + .card-content { background: var(--cafe-texto); color: white; border-color: var(--cafe-texto); }

        #contenido-calculadora { display: none; }

        /* Estética de Condiciones (Tooltips sutiles) */
        .info-nota { font-size: 0.65rem; color: var(--dorado-acento); cursor: help; margin-left: 5px; font-style: italic; }

        .service-group { text-align: left; margin-bottom: 25px; }
        label.group-title { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; margin-bottom: 8px; display: block; }

        select { width: 100%; padding: 12px; border: 1px solid var(--borde); background-color: var(--beige-fondo); font-family: 'Montserrat', sans-serif; font-size: 0.9rem; color: var(--cafe-texto); appearance: none; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%3E%3Cpath%20fill%3D%22%234A443F%22%20d%3D%22M7%2010l5%205%205-5z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right 10px center; }

        .checkbox-container { border-top: 1px solid var(--borde); }
        .checkbox-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--borde); cursor: pointer; }
        .checkbox-item input { margin-right: 15px; accent-color: var(--cafe-texto); }
        .checkbox-label { flex-grow: 1; font-size: 0.85rem; font-weight: 300; }
        .checkbox-price { font-size: 0.85rem; font-weight: 600; }

        /* Caja de Totales y Tiempo */
        .results-box { margin-top: 25px; padding: 25px 0; border-top: 1px solid var(--cafe-texto); border-bottom: 1px solid var(--borde); }
        .total-label { font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .total-amount { font-family: 'Playfair Display', serif; font-size: 2.8rem; margin-bottom: 10px; }
        .time-estimate { font-size: 0.8rem; color: var(--dorado-acento); font-style: italic; }

        .btn-whatsapp { display: block; margin-top: 25px; background-color: var(--cafe-texto); color: white; padding: 20px; text-decoration: none; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }
        
        .footer-disclaimer { font-size: 0.6rem; color: #aaa; margin-top: 20px; line-height: 1.4; text-align: justify; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Logo" class="logo">
    <h2>Beautiful Nails</h2>
    <span class="step-label">Cotizador & Tiempos</span>

    <div class="radio-group">
        <label class="radio-card">
            <input type="radio" name="tipo" value="Aplicación Nueva" onclick="activarCalculadora()">
            <div class="card-content">✨ Nueva Aplicación</div>
        </label>
        <label class="radio-card">
            <input type="radio" name="tipo" value="Retoque" onclick="activarCalculadora()">
            <div class="card-content">💅 Solo Retoque</div>
        </label>
    </div>

    <div id="contenido-calculadora">
        <div class="service-group">
            <label class="group-title">Técnica base <span class="info-nota" title="Incluye 1 color liso o decoración sencilla (no francés)">ⓘ info</span></label>
            <select id="base" onchange="ejecutarCalculo()">
                <option value="0" data-time="0" data-desc="">Seleccionar...</option>
                <option value="200" data-time="60" data-desc="Rubber">Rubber - $200 (60 min)</option>
                <option value="100" data-time="40" data-desc="Calcio Cristal">Calcio Cristal - $100 (40 min)</option>
                <option value="150" data-time="60" data-desc="Gel Semipermanente">Gel Semipermanente - $150 (60 min)</option>
            </select>
        </div>

        <div class="service-group">
            <label class="group-title">Largo / Extensión</label>
            <select id="largo" onchange="ejecutarCalculo()">
                <option value="0" data-time="0" data-desc="">Uña natural</option>
                <option value="200" data-time="20" data-desc="Tip #2">Acrílico Tip (Hasta #2) - +$200</option>
                <option value="250" data-time="30" data-desc="Escultural #2">Escultural (Hasta #2) - +$250</option>
            </select>
        </div>

        <div class="service-group">
            <label class="group-title">Complementos</label>
            <div class="checkbox-container">
                <label class="checkbox-item"><input type="checkbox" class="extra" value="100" data-time="15" data-desc="Mani Rusa" onchange="ejecutarCalculo()"><span class="checkbox-label">Manicura Rusa</span><span class="checkbox-price">$100</span></label>
                <label class="checkbox-item"><input type="checkbox" class="extra" value="100" data-time="80" data-desc="Retiro" onchange="ejecutarCalculo()"><span class="checkbox-label">Retiro de material</span><span class="checkbox-price">$100</span></label>
            </div>
        </div>

        <div class="results-box">
            <span class="total-label">Inversión Estimada</span>
            <div class="total-amount" id="total">$0.00</div>
            <div class="time-estimate" id="tiempo">Tiempo estimado: 0 min</div>
        </div>

        <a href="#" id="btnWsp" class="btn-whatsapp" target="_blank">Agendar Cita</a>
        
        <p class="footer-disclaimer">
            * Los tiempos son aproximados y pueden variar por factores ajenos al servicio. Por higiene, no se atienden uñas con hongos, enterradas o pacientes diabéticos.
        </p>
    </div>
</div>

<script>
    function activarCalculadora() {
        document.getElementById('contenido-calculadora').style.display = "block";
        ejecutarCalculo();
    }

    function ejecutarCalculo() {
        let total = 0;
        let tiempoTotal = 0;
        let lista = [];

        // Selectores
        ['base', 'largo'].forEach(id => {
            const el = document.getElementById(id);
            const opt = el.options[el.selectedIndex];
            if (parseInt(el.value) > 0 || opt.getAttribute('data-time') > 0) {
                total += parseInt(el.value);
                tiempoTotal += parseInt(opt.getAttribute('data-time'));
                if(opt.getAttribute('data-desc')) lista.push(opt.getAttribute('data-desc'));
            }
        });

        // Checkboxes
        document.querySelectorAll('.extra:checked').forEach(cb => {
            total += parseInt(cb.value);
            tiempoTotal += parseInt(cb.getAttribute('data-time'));
            lista.push(cb.getAttribute('data-desc'));
        });

        document.getElementById('total').innerText = "$" + total + ".00";
        document.getElementById('tiempo').innerText = "Tiempo estimado: ~" + tiempoTotal + " min";

        const msj = encodeURIComponent("¡Hola Dulce! 💅 Cotización: " + lista.join(", ") + ". Total: $" + total + " (aprox " + tiempoTotal + " min)");
        document.getElementById('btnWsp').href = "https://wa.me/5215521969219?text=" + msj;
    }
</script>

</body>
</html>
