<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador - Dulce Nails</title>
    <style>
        :root {
            --rosa-pastel: #fdf2f5;
            --rosa-medio: #f48fb1;
            --rosa-fuerte: #ad1457;
            --dorado: #c5a059;
            --texto: #4e4e4e;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--rosa-pastel);
            color: var(--texto);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(173, 20, 87, 0.1);
            max-width: 480px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(197, 160, 89, 0.3);
        }
        .logo {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 10px;
            border: 3px solid var(--rosa-medio);
        }
        h2 { color: var(--rosa-fuerte); margin: 5px 0; font-weight: 300; letter-spacing: 1px; font-size: 1.5rem; }
        .service-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 4px; color: var(--rosa-fuerte); text-transform: uppercase; }
        select {
            width: 100%;
            padding: 10px;
            border: 1.5px solid var(--rosa-medio);
            border-radius: 10px;
            background-color: #fff;
            font-size: 0.9rem;
            color: var(--texto);
        }
        .total-box {
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(145deg, #ffffff, #fdf2f5);
            border-radius: 20px;
            border: 2px solid var(--dorado);
        }
        .total-amount { font-size: 2rem; font-weight: bold; color: var(--rosa-fuerte); margin-top: 5px; }
        .disclaimer { font-size: 0.7rem; color: #999; margin-top: 15px; line-height: 1.2; text-align: justify; }
        .btn-whatsapp {
            display: block;
            margin-top: 15px;
            background-color: #25d366;
            color: white;
            padding: 14px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.jpg" alt="Dulce Nails Logo" class="logo">
    
    <h2>Cotizador Dulce Nails</h2>

    <div class="service-group">
        <label>1. Manos: Base o Técnica</label>
        <select id="base" onchange="calcular()">
            <option value="0" data-desc="">Selecciona una opción...</option>
            <option value="200" data-desc="Rubber">Aplicación Rubber (Inc. 1 color) - $200</option>
            <option value="200" data-desc="Calcio">Calcio Cristal (Inc. 1 color) - $200</option>
            <option value="150" data-desc="Gel Semi">Gel Semipermanente (1-2 tonos) - $150</option>
            <option value="200" data-desc="Acrílico T2">Acrílico Tip (Hasta #2) - $200</option>
            <option value="250" data-desc="Escultural T2">Acrílico Escultural (Hasta #2) - $250</option>
            <option value="250" data-desc="Acrílico T3">Acrílico Tip (#3) - $250</option>
            <option value="300" data-desc="Escultural T3">Acrílico Escultural (#3) - $300</option>
            <option value="300" data-desc="Acrílico T4">Acrílico Tip (#4) - $300</option>
            <option value="350" data-desc="Escultural T4">Acrílico Escultural (#4) - $350</option>
            <option value="350" data-desc="Acrílico T5">Acrílico Tip (#5) - $350</option>
            <option value="400" data-desc="Escultural T5">Acrílico Escultural (#5) - $400</option>
        </select>
    </div>

    <div class="service-group">
        <label>2. Pies</label>
        <select id="pies" onchange="calcular()">
            <option value="0" data-desc="">Sin servicio de pies</option>
            <option value="150" data-desc="Gel Pies">Gel en pies (1 tono) - $150</option>
            <option value="250" data-desc="Pedicure">Pedicure (Inc. 1 color) - $250</option>
            <option value="400" data-desc="Spa Pedi">Spa Pedicure (Completo) - $400</option>
        </select>
    </div>

    <div class="service-group">
        <label>3. Complementos (Espacio 1)</label>
        <select id="extra1" onchange="calcular()">
            <option value="0" data-desc="">Ninguno</option>
            <option value="100" data-desc="Mani Rusa">Manicura Rusa - $100</option>
            <option value="250" data-desc="Spa Mani">Spa Manicure - $250</option>
            <option value="100" data-desc="Diseño">Diseño Sencillo - $100</option>
            <option value="100" data-desc="Retiro">Retiro de material - $100</option>
            <option value="150" data-desc="Retoque Acri">Retoque Acrílico - $150</option>
            <option value="100" data-desc="Retoque Gel">Retoque Gel - $100</option>
        </select>
    </div>

    <div class="service-group">
        <label>4. Complementos (Espacio 2)</label>
        <select id="extra2" onchange="calcular()">
            <option value="0" data-desc="">Ninguno</option>
            <option value="100" data-desc="Mani Rusa">Manicura Rusa - $100</option>
            <option value="250" data-desc="Spa Mani">Spa Manicure - $250</option>
            <option value="100" data-desc="Diseño">Diseño Sencillo - $100</option>
            <option value="100" data-desc="Retiro">Retiro de material - $100</option>
        </select>
    </div>

    <div class="service-group">
        <label>5. Complementos (Espacio 3)</label>
        <select id="extra3" onchange="calcular()">
            <option value="0" data-desc="">Ninguno</option>
            <option value="100" data-desc="Mani Rusa">Manicura Rusa - $100</option>
            <option value="250" data-desc="Spa Mani">Spa Manicure - $250</option>
            <option value="100" data-desc="Diseño">Diseño Sencillo - $100</option>
            <option value="100" data-desc="Retiro">Retiro de material - $100</option>
        </select>
    </div>

    <div class="service-group">
        <label>6. Complementos (Espacio 4)</label>
        <select id="extra4" onchange="calcular()">
            <option value="0" data-desc="">Ninguno</option>
            <option value="100" data-desc="Mani Rusa">Manicura Rusa - $100</option>
            <option value="250" data-desc="Spa Mani">Spa Manicure - $250</option>
            <option value="100" data-desc="Diseño">Diseño Sencillo - $100</option>
            <option value="100" data-desc="Retiro">Retiro de material - $100</option>
        </select>
    </div>

    <div class="total-box">
        <div style="font-size: 0.8rem; color: var(--dorado); font-weight: bold;">TOTAL ESTIMADO</div>
        <div class="total-amount" id="total">$0.00</div>
    </div>

    <div class="disclaimer">
        * No se sacan uñas enterradas. Por higiene, no se atienden uñas con hongos o pie diabético. Retiro de gel se cobra aparte en servicios de pies.
    </div>

    <a href="#" id="btnWsp" class="btn-whatsapp" target="_blank">Enviar a WhatsApp</a>
</div>

<script>
    function calcular() {
        const ids = ['base', 'pies', 'extra1', 'extra2', 'extra3', 'extra4'];
        let total = 0;
        let servicios = [];

        ids.forEach(id => {
            const select = document.getElementById(id);
            const precio = parseInt(select.value);
            const texto = select.options[select.selectedIndex].getAttribute('data-desc');
            
            if (precio > 0) {
                total += precio;
                servicios.push(texto);
            }
        });

        document.getElementById('total').innerText = "$" + total + ".00";
        
        const numWA = "5215500000000"; // CAMBIA ESTO POR EL TEL DE DULCE
        const msj = encodeURIComponent("¡Hola Dulce! 💅 Cotización: " + servicios.join(", ") + ". Total: $" + total);
        document.getElementById('btnWsp').href = "https://wa.me/" + numWA + "?text=" + msj;
    }
</script>

</body>
</html>
