<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador - Beautiful Nails</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --beige-fondo: #F9F7F2;
            --crema-card: #FFFFFF;
            --cafe-texto: #4A443F;
            --rosa-acento: #D4A373; /* Tono arena/dorado suave de la publicación */
            --borde: #E5E1D8;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--beige-fondo);
            color: var(--cafe-texto);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: var(--crema-card);
            padding: 40px 30px;
            border-radius: 5px; /* Bordes menos redondeados para verse más editorial */
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid var(--borde);
        }

        .logo { 
            max-width: 110px; 
            margin-bottom: 25px; 
            filter: grayscale(20%);
        }

        h2 { 
            font-family: 'Playfair Display', serif; 
            color: var(--cafe-texto); 
            font-size: 1.8rem;
            font-weight: 400;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .step-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--rosa-acento);
            margin-bottom: 20px;
            display: block;
        }
        
        /* Botones de Selección Inicial (Estética Editorial) */
        .radio-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .radio-card { flex: 1; cursor: pointer; }
        .radio-card input { display: none; }
        .card-content {
            border: 1px solid var(--borde);
            padding: 15px 10px;
            transition: 0.4s;
            font-size: 0.8rem;
            letter-spacing: 1px;
            background: transparent;
            text-transform: uppercase;
        }
        .radio-card input:checked + .card-content {
            border-color: var(--cafe-texto);
            background: var(--cafe-texto);
            color: white;
        }

        .service-group { text-align: left; margin-bottom: 25px; }
        label.group-title {
            display: block;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: var(--cafe-texto);
        }

        select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--borde);
            background-color: var(--beige-fondo);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            outline: none;
            color: var(--cafe-texto);
        }

        /* Checkboxes Minimalistas */
        .checkbox-container { border-top: 1px solid var(--borde); }
        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--borde);
            cursor: pointer;
        }
        .checkbox-item input { margin-right: 15px; accent-color: var(--cafe-texto); }
        .checkbox-label { flex-grow: 1; font-size: 0.85rem; font-weight: 300; }
        .checkbox-price { font-size: 0.85rem; font-weight: 600; }

        /* Resumen */
        .resumen-box {
            margin-top: 30px;
            text-align: left;
            padding: 20px;
            background: var(--beige-fondo);
        }
        .resumen-title { 
            font-family: 'Playfair Display', serif;
            font-weight: 700; 
            font-size: 1rem;
            margin-bottom: 10px; 
        }
        #lista-resumen { padding-left: 18px; margin: 0; font-size: 0.8rem; font-weight: 300; }

        .total-box {
            margin-top: 20px;
            padding: 20px 0;
            border-top: 1px solid var(--cafe-texto);
        }
        .total-label { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; }
        .total-amount { font-family: 'Playfair Display', serif; font-size: 2.5em; color: var(--cafe-texto); }

        .btn-whatsapp {
            display: block;
            margin-top: 25px;
            background-color: var(--cafe-texto);
            color: white;
            padding: 18px;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-whatsapp:hover { opacity: 0.9; }
        
        #contenido-calculadora { display: none; }
        .disclaimer { font-size: 0.65rem; color: #aaa; margin-top: 20px; font-weight: 300; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Dulce Nails" class="logo">
    <h2>Nails by Dul</h2>
    <span class="step-label">Cotizador Exclusivo</span>

    <div class="radio-group">
        <label class="radio-card">
            <input type="radio" name="tipo" value="Aplicación Nueva" onchange="mostrarContenido()">
            <div class="card-content">Nueva Aplicación</div>
        </label>
        <label class="radio-card">
            <input type="radio" name="tipo" value="Retoque" onchange="mostrarContenido()">
            <div class="card-content">Retoque</div>
        </label>
    </div>

    <div id="contenido-calculadora">
        <div class="service-group">
            <label class="group-title">Técnica base</label>
            <select id="base" onchange="calcular()">
                <option value="0" data-desc="">Seleccionar...</option>
                <option value="200" data-desc="Rubber">Aplicación Rubber - $200</option>
                <option value="200" data-desc="Calcio">Calcio Cristal - $200</option>
                <option value="150" data-desc="Gel Semipermanente">Gel Semipermanente - $150</option>
            </select>
        </div>

        <div class="service-group">
            <label class="group-title">Largo deseado</label>
            <select id="acrilico" onchange="calcular()">
                <option value="0" data-desc="">Uña natural</option>
                <option value="200" data-desc="Acrílico Tip #2">Acrílico Tip (Hasta #2) - $200</option>
                <option value="250" data-desc="Escultural #2">Escultural (Hasta #2) - $250</option>
                <option value="250" data-desc="Acrílico Tip #3">Acrílico Tip (#3) - $250</option>
                <option value="300" data-desc="Escultural #3">Escultural (#3) - $300</option
