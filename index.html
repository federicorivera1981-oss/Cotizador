<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador - Dulce Nails</title>
    <style>
        :root {
            --rosa-pastel: #fdf2f5;
            --rosa-medio: #f48fb1;
            --rosa-fuerte: #ad1457;
            --dorado: #c5a059;
            --texto: #4e4e4e;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--rosa-pastel);
            color: var(--texto);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(173, 20, 87, 0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(197, 160, 89, 0.3);
        }
        .logo {
            width: 140px;
            height: 140px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 10px;
            border: 3px solid var(--rosa-medio);
        }
        h2 { color: var(--rosa-fuerte); margin: 5px 0; font-weight: 300; letter-spacing: 1px; font-size: 1.4rem; }
        .service-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: var(--rosa-fuerte); text-transform: uppercase; }
        select {
            width: 100%;
            padding: 12px;
            border: 1.5px solid var(--rosa-medio);
            border-radius: 12px;
            background-color: #fff;
            font-size: 1rem;
            color: var(--texto);
        }
        .total-box {
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(145deg, #ffffff, #fdf2f5);
            border-radius: 20px;
            border: 2px solid var(--dorado);
        }
        .total-amount { font-size: 2.2rem; font-weight: bold; color: var(--rosa-fuerte); margin-top: 5px; }
        .disclaimer { font-size: 0.75rem; color: #888; margin-top: 15px; line-height: 1.3; text-align: center; font-style: italic; }
        .btn-whatsapp {
            display: block;
            margin-top: 15px;
            background-color: #25d366;
            color: white;
            padding: 16px;
            text-decoration: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.jpg" alt="Dulce Nails" class="logo">
    
    <h2>Cotizador de Servicios</h2>

    <div class="service-group">
        <label>1. Servicio de Manos</label>
        <select id="manos" onchange="calcular()">
            <option value="0" data-desc="">Selecciona una opción...</option>
            <option value="200" data-desc="Aplicación Rubber">Aplicación Rubber - $200</option>
            <option value="200" data-desc="Calcio Cristal">Calcio cristal - $200</option>
            <option value="150" data-desc="Gel Semipermanente">Gel semipermanente - $150</option>
            <option value="200" data-desc="Acrílico Tip #2">Acrílico con tip (Hasta #2) - $200</option>
            <option value="250" data-desc="Escultural #2">Acrílico escultural (Hasta #2) - $250</option>
            <option value="250" data-desc="Acrílico Tip #3">Acrílico con tip (#3) - $250</option>
            <option value="300" data-desc="Escultural #3">Acrílico escultural (#3) - $300</option>
            <option value="300" data-desc="Acrílico Tip #4">Acrílico con tip (#4) - $300</option>
            <option value="350" data-desc="Escultural #4">Acrílico escultural (#4) - $350</option>
            <option value="350" data-desc="Acrílico Tip #5">Acrílico con tip (#5) - $350</option>
            <option value="400" data-desc="Escultural #5">Acrílico escultural (#5) - $400</option>
        </select>
    </div>

    <div class="service-group">
        <label>2. Servicio de Pies</label>
        <select id="pies" onchange="calcular()">
            <option value="0" data-desc="">Sin servicio de pies</option>
            <option value="150" data-desc="Gel en pies">Gel en pies - $150</option>
            <option value="250" data-desc="Pedicure">Pedicure - $250</option>
            <option value="400" data-desc="Spa Pedicure">Spa pedicure - $400</option>
        </select>
    </div>

    <div class="service-group">
        <label>3. Complemento / Spa A</label>
        <select id="extra1" onchange="calcular()">
            <option value="0" data-desc="">Ninguno</option>
            <option value="100" data-desc="Manicura Rusa">Manicura rusa - $100</option>
            <option value="250" data-desc="Spa Manicure">Spa manicure - $250</option>
            <option value="100" data-desc="Diseño Sencillo">Diseño sencillo - $100</option>
            <option value="100" data-desc="Retiro">Retiro - $100</option>
            <option value="150" data-desc="Retoque Acrílico">Retoque acrílico - $150</option>
            <option value="100" data-desc="Retoque Gel">Retoque Gel - $100</option>
        </select>
    </div>

    <div class="service-group">
        <label>4. Complemento / Spa B</label>
        <select id="extra2" onchange="calcular()">
            <option value="0" data-desc="">Ninguno</option>
            <option value="100" data-desc="Manicura Rusa">Manicura rusa - $100</option>
            <option value="250" data-desc="Spa Manicure">Spa manicure - $250</option>
            <option value="100" data-desc="Diseño Sencillo">Diseño sencillo - $100</option>
            <option value="100" data-desc="Retiro">Retiro - $100</option>
        </select>
    </div>

    <div class="total-box">
        <div style="font-size: 0.8rem; color: var(--dorado); font-weight: bold; letter-spacing: 1px;">TOTAL ESTIMADO</div>
        <div class="total-amount" id="total">$0.00</div>
    </div>

    <div class="disclaimer">
        * No se sacan uñas enterradas. Por higiene, no se atienden uñas con hongos o pie diabético.
    </div>

    <a href="#" id="btnWsp" class="btn-whatsapp" target="_blank">Agendar cita por WhatsApp</a>
</div>

<script>
    function calcular() {
        const ids = ['manos', 'pies', 'extra1', 'extra2'];
        let total = 0;
        let seleccionados = [];

        ids.forEach(id => {
            const el = document.getElementById(id);
            const precio = parseInt(el.value);
            const nombre = el.options[el.selectedIndex].getAttribute('data-desc');
            
            if (precio > 0) {
                total += precio;
                seleccionados.push(nombre);
            }
        });

        document.getElementById('total').innerText = "$" + total + ".00";
        
        // Reemplaza las X con el número de Dulce (ej: 5215512345678)
        const telefono = "5521969219"; 
        const mensaje = encodeURIComponent("¡Hola Dulce! 💅 Me interesa: " + seleccionados.join(" + ") + ". Mi total estimado es de $" + total);
        document.getElementById('btnWsp').href = "https://wa.me/" + telefono + "?text=" + mensaje;
    }
</script>

</body>
</html>
